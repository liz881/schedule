<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="230" r="130" fill="none" stroke="#fff" stroke-width="18"/>
  <!-- Clock hands -->
  <line x1="256" y1="230" x2="256" y2="150" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="230" x2="300" y2="230" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="230" r="16" fill="#fff"/>
  <!-- Book icon below -->
  <g transform="translate(256,400)">
    <rect x="-70" y="-35" width="140" height="70" rx="8" fill="#fff" opacity="0.9"/>
    <line x1="-50" y1="-10" x2="50" y2="-10" stroke="#764ba2" stroke-width="5" stroke-linecap="round"/>
    <line x1="-50" y1="10" x2="50" y2="10" stroke="#764ba2" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
